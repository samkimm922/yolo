version: "2.0"

project:
  name: "YOLO"
  root: "."
  src: "src"
  source_roots:
    - "src"
    - "__tests__"
  source_extensions:
    - ".ts"
    - ".tsx"
  business_file_patterns:
    - "*.ts"
    - "bin/**/*.ts"
    - "hooks/**/*.ts"
    - "lib/**/*.ts"
    - "scripts/**/*.ts"
    - "skills/**/*.ts"
    - "src/**/*.ts"
    - "tools/**/*.ts"
    - "fixtures/**/*.ts"
    - "__tests__/**/*.ts"
  config_file_patterns:
    - "config.yaml"
    - "config.example.yaml"
    - "package.json"
    - "package-lock.json"
    - "tsconfig.json"
    - "tsconfig.test.json"
    - "schemas/**/*.json"
    - ".yolo/config.json"
  framework: "generic"
  exclude:
    - "node_modules"
    - "dist"
    - ".git"

build:
  type_check: "tsc --noEmit"
  lint: "node --import tsx scripts/source-grep-meta.ts"
  test: "node --import tsx --test __tests__/*.test.ts"
  build: "npm run build --silent"

ai:
  executor: "claude"
  model: "claude-sonnet-4-6"
  timeout_ms: 480000
  settings: "settings-minimal.json"
  claude_permission_mode: "acceptEdits"

gate:
  timeout:
    type_check: 120000
    lint: 90000
    test: 120000
    build: 240000
  max_files: 5
  max_lines_per_file: 150

runner:
  max_retries:
    1: 3
    2: 1
  circuit_breaker: 2
  session_timeout_h: 4
  task_timeout_m: 30
  stash_prefix: "temp-stash-for-"

state:
  dir: "state"
  max_events: 500
  max_changes: 500
  max_runs: 100

docs:
  dir: "."
  auto_generate: true
  archive_max: 50

learn:
  enabled: true
  auto_evolve: true
  decay_days: 10
  min_confidence: 3

progress_server:
  port: 3456
