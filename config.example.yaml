version: "2.0"

project:
  name: "my-project"
  root: "."
  src: "src"
  source_roots:
    - "src"
  source_extensions:
    - ".ts"
    - ".tsx"
    - ".js"
    - ".jsx"
  # Explicit project policy for business-code detection. YOLO no longer
  # infers business files from built-in language extension tables.
  business_file_patterns:
    - "src/**/*.ts"
    - "src/**/*.tsx"
    - "test/**/*.ts"
    - "__tests__/**/*.ts"
  # Explicit project policy for pure config/toolchain tasks.
  config_file_patterns:
    - "package.json"
    - "tsconfig.json"
    - "*.config.js"
    - "*.config.ts"
  framework: "generic"
  exclude:
    - "node_modules"
    - "dist"
    - ".git"

build:
  # Backward-compatible alias for business file inclusion globs.
  # Prefer project.business_file_patterns for new projects.
  business_globs: []
  # Optional command overrides. When omitted, YOLO detects package manager from
  # lockfiles (pnpm-lock.yaml -> pnpm, yarn.lock -> yarn, otherwise npm).
  type_check: "npm run typecheck"
  lint: "npm run lint"
  dead_code: ""
  test: "npm test"
  build: "npm run build"
  # Optional literal output markers. Matching failures are typed by this
  # project declaration; unmatched non-zero commands fall back to stderr.
  failure_output_rules: []
  # For require_tests=true outside the built-in node:test TAP adapter, declare
  # how the project reports the executed test count. Extraction is fail-closed.
  # test_count:
  #   minimum: 1
  #   pattern: "^(?<count>[0-9]+) passed"
  #   flags: "m"

executor:
  # Default executor/provider invocation timeout. Override for slower agents.
  timeout_ms: 600000

ai:
  executor: "claude"
  model: "claude-sonnet-4-6"
  # Deprecated alias; executor.timeout_ms takes precedence.
  timeout_ms: 600000
  settings: ""
  claude_permission_mode: "acceptEdits"

gate:
  timeout:
    type_check: 120000
    lint: 90000
    dead_code: 30000
    test: 120000
    build: 240000
  max_files: 5
  max_lines_per_file: 150

runner:
  max_retries:
    1: 3
    2: 1
  circuit_breaker: 2
  session_timeout_h: 4
  task_timeout_m: 30
  stash_prefix: "temp-stash-for-"

state:
  dir: "state"
  max_events: 500
  max_changes: 500
  max_runs: 100
  max_learning: 500
  max_session_memory: 200

docs:
  dir: "."
  auto_generate: true
  archive_max: 50

learn:
  enabled: true
  auto_evolve: true
  decay_days: 10
  min_confidence: 3

progress_server:
  port: 3456
