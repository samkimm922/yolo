name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npm run typecheck --silent

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npm run build --silent

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npm test --silent

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: npm run verify --silent

  docs-warning-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node --import tsx --test __tests__/docs-truth-sync.test.ts __tests__/warning-inventory.test.ts

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node --import tsx --test __tests__/package-install-smoke.test.ts

  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test "$(git ls-files '.yolo/**' | wc -l | tr -d ' ')" = "0"
      - run: test ! -e vitest.yolo.config.ts

  source-grep-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node --import tsx scripts/source-grep-meta.ts
      - run: node --import tsx --test __tests__/no-source-grep-meta.test.ts

  workflow-security-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node --import tsx scripts/ci-guard.ts actionlint
      - run: node --import tsx scripts/ci-guard.ts security

  clean-clone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: git clone --no-hardlinks . /tmp/p5-clean
      - run: cd /tmp/p5-clean && pnpm install --frozen-lockfile
      - run: cd /tmp/p5-clean && npm test
